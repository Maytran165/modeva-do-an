<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phiếu giao hàng</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    @page { size: 80mm 130mm; margin: 0; }
    html, body { margin: 0; padding: 0; background: #fff; }
    .ship-label {
      width: 80mm;
      height: 130mm;
      box-sizing: border-box;
      padding: 6mm 4mm;
      font-family: Manrope, Segoe UI, sans-serif;
      color: #111;
      overflow: hidden;
    }
    .ship-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }
    .ship-brand {
      font-weight: 800;
      font-size: 16px;
      letter-spacing: .02em;
      line-height: 1.05;
    }
    .ship-brand small {
      display: block;
      font-size: 11px;
      font-weight: 700;
      opacity: .85;
      margin-top: 2px;
    }
    .ship-barcode {
      width: 100%;
      margin-top: 6px;
      display: block;
    }
    .ship-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
      margin-top: 4px;
    }
    .ship-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2px;
    }
    .ship-lbl {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .02em;
      opacity: .75;
    }
    .ship-val {
      font-size: 12px;
      font-weight: 700;
      line-height: 1.2;
      word-break: break-word;
    }
    .ship-items {
      margin-top: 6px;
      border: 1px dashed rgba(0,0,0,.2);
      padding: 6px;
      border-radius: 2mm;
      height: 52mm;
      box-sizing: border-box;
    }
    .ship-items .ship-items-title {
      font-size: 10px;
      font-weight: 800;
      opacity: .8;
      margin-bottom: 4px;
    }
    .ship-items ul { padding-left: 16px; margin: 0; font-size: 11px; }
    .ship-items li { margin: 2px 0; }
    .ship-bottom {
      margin-top: 5px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 11px;
      font-weight: 800;
    }
    .ship-bottom .ship-amount { text-align: right; }
    .ship-debug-note {
      position: fixed;
      left: 0;
      top: 0;
      padding: 10px;
      font-size: 12px;
      color: #b91c1c;
      background: #fff;
      border-bottom-right-radius: 8px;
      z-index: 99999;
      display: none;
    }
  </style>
</head>
<body>
  <div class="ship-debug-note" id="shipNoDataNote"></div>
  <div class="ship-label" id="shipLabelRoot">
    <!-- Filled by shipping-label.js -->
  </div>

  <script src="../js/shipping-label.js"></script>
</body>
</html>
